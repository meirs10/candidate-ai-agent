name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ lint
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check .

  # ------------------------------------------------------------------ test
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Run e2e smoke test
        run: uv run pytest tests/e2e_smoke_test.py -v

  # ----------------------------------------------------------------- docker
  docker:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t candidate-ai-agent .

      - name: Start container
        run: |
          docker run -d --name ci-smoke \
            -p 8501:8501 \
            candidate-ai-agent

      - name: Wait for Streamlit health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8501/_stcore/health; then
              echo "Streamlit is healthy"
              exit 0
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 1
          done
          echo "Health check timed out"
          docker logs ci-smoke
          exit 1

      - name: Teardown
        if: always()
        run: docker rm -f ci-smoke || true
